<div class="flex flex-col items-center gap-3">
  <!-- Actions : tirer/rester toujours dispo, double/séparer/abandon selon le contexte -->
  <div class="flex flex-wrap items-center justify-center gap-2.5">
    <p-button label="Tirer" (onClick)="hit.emit()" />
    <p-button label="Rester" (onClick)="stand.emit()" />
    @if (canDouble()) {
      <p-button label="Doubler" severity="info" (onClick)="double.emit()" />
    }
    @if (canSplit()) {
      <p-button label="Séparer" severity="info" (onClick)="split.emit()" />
    }
    @if (canSurrender()) {
      <p-button
        label="Abandonner"
        severity="secondary"
        [text]="true"
        (onClick)="surrender.emit()"
      />
    }
  </div>

  <!-- Conseil de stratégie de base (masqué si aucun) -->
  @if (hint()) {
    <div
      class="flex items-center gap-1.5 rounded-full border border-amber-400/30 bg-black/25 px-3 py-1 text-xs text-emerald-100/90"
    >
      <i class="pi pi-lightbulb text-amber-400"></i>
      <span
        >Conseil : <b class="text-amber-300">{{ hint() }}</b></span
      >
    </div>
  }
</div>
