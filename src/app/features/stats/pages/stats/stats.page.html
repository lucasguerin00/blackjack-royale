<!-- Barre supérieure : retour au lobby + remise à zéro de la portée active -->
<div class="mx-auto flex max-w-[1100px] items-center justify-between px-[18px] pt-3.5">
  <p-button label="← Accueil" severity="secondary" [text]="true" (onClick)="back()" />
  <p-button
    label="Réinitialiser"
    icon="pi pi-refresh"
    severity="secondary"
    [disabled]="empty()"
    (onClick)="reset()"
  />
</div>

<div class="mx-auto max-w-[1100px] px-[18px] pb-16 pt-4">
  <!-- Titre + sélecteur de portée (session / all-time) -->
  <header class="mb-5 flex flex-wrap items-center justify-between gap-3">
    <h1 class="text-[28px] font-bold text-amber-400">📊 Statistiques</h1>
    <p-selectbutton
      [options]="scopeOptions"
      [ngModel]="scope()"
      optionLabel="label"
      optionValue="value"
      [allowEmpty]="false"
      (onChange)="scope.set($event.value)"
    />
  </header>

  <!-- État vide : aucune main enregistrée dans la portée -->
  @if (empty()) {
    <div class="rounded-2xl border border-amber-500/30 bg-black/20 px-6 py-16 text-center">
      <div class="text-6xl">🃏</div>
      <p class="mx-auto mt-3 max-w-[380px] text-emerald-200/70">
        Aucune main jouée pour l'instant. Lance une partie pour commencer à remplir tes stats !
      </p>
      <p-button class="mt-5 inline-block" label="Jouer au Classique" (onClick)="play()" />
    </div>
  } @else {
    <!-- Panneau d'indicateurs alimenté par la portée choisie -->
    <app-stats-panel [stats]="stats()" />
  }
</div>
