@if (faceDown()) {
  <div
    class="relative h-[100px] w-[70px] select-none rounded-lg border-2 border-white/90 shadow-lg bg-[repeating-linear-gradient(45deg,#7b1113_0_6px,#9c1a1d_6px_12px)]"
  >
    <span class="absolute inset-0 flex items-center justify-center text-4xl text-white/40">♠</span>
  </div>
} @else if (card(); as c) {
  <div
    class="relative h-[100px] w-[70px] select-none rounded-lg border border-black/10 bg-stone-50 shadow-lg"
    [class.pc-deal]="animation() === 'deal'"
    [class.pc-flip]="animation() === 'flip'"
    [class.text-red-600]="red()"
    [class.text-neutral-900]="!red()"
  >
    <span class="absolute left-2 top-1.5 text-lg font-extrabold leading-none">{{ c.rank }}</span>
    <span class="absolute inset-0 flex items-center justify-center text-3xl opacity-90">{{
      c.suit
    }}</span>
    <span class="absolute bottom-1.5 right-2 text-2xl">{{ c.suit }}</span>
  </div>
}
